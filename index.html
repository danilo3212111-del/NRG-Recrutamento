<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NRG Studios - Recrutamento de Elite</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
body { background-color: #050508; background-image: radial-gradient(circle at 50% 0%, #2a0845 0%, #050508 60%); color: #ffffff; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow-x: hidden; }
.container { background: rgba(15, 15, 20, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(138, 43, 226, 0.3); border-radius: 16px; padding: 40px; width: 100%; max-width: 600px; box-shadow: 0 0 40px rgba(138, 43, 226, 0.1); }
.header { text-align: center; margin-bottom: 30px; }
.header h1 { font-size: 32px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; background: linear-gradient(90deg, #8a2be2, #d8b4fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header p { color: #a0a0b0; font-size: 14px; margin-top: 10px; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; color: #c0c0d0; margin-bottom: 8px; letter-spacing: 1px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; background: rgba(0, 0, 0, 0.4); border: 1px solid #333; border-radius: 8px; padding: 12px 15px; color: #fff; font-size: 14px; outline: none; transition: all 0.3s ease; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #8a2be2; box-shadow: 0 0 15px rgba(138, 43, 226, 0.3); }
.form-group textarea { resize: vertical; min-height: 100px; }
.submit-btn { width: 100%; background: linear-gradient(90deg, #6a0dad, #8a2be2); color: #fff; border: none; border-radius: 8px; padding: 15px; font-size: 16px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: all 0.3s ease; }
.submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(138, 43, 226, 0.4); }
.submit-btn:disabled { background: #333; cursor: not-allowed; transform: none; box-shadow: none; color: #888; }
#ai-status { text-align: center; margin-top: 15px; font-size: 12px; font-weight: bold; color: #ff3366; display: none; text-transform: uppercase; letter-spacing: 1px; }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>NRG Studios</h1>
        <p>Apenas os mais aptos sobrevivem. O Sistema de IA avaliará suas respostas.</p>
    </div>

    <form id="nrg-form">
        <div class="form-group"><label>Nome / Nickname</label><input type="text" id="nome" required maxlength="50"></div>
        <div class="form-group"><label>Usuário do Discord</label><input type="text" id="discord" required maxlength="50"></div>
        <div class="form-group">
            <label>Especialidade Principal</label>
            <select id="cargo" required>
                <option value="" disabled selected>Selecione sua área...</option>
                <option value="Scripter">Scripter (Lua / OOP / Knit)</option>
                <option value="Builder">Builder / Modelador 3D</option>
                <option value="Animator">Animador</option>
                <option value="VFX">VFX Artist</option>
            </select>
        </div>
        <div class="form-group"><label>Link do Portfólio (Opcional)</label><input type="url" id="portfolio" maxlength="150"></div>
        <div class="form-group"><label>Por que a NRG Studios?</label><textarea id="motivo" required maxlength="1500"></textarea></div>

        <button type="submit" class="submit-btn" id="btn-submit">Submeter ao Sistema</button>
        <div id="ai-status">Processando...</div>
    </form>
</div>

<script>
document.getElementById('nrg-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-submit');
    const status = document.getElementById('ai-status');
    
    const dados = {
        nome: document.getElementById('nome').value,
        discord: document.getElementById('discord').value,
        cargo: document.getElementById('cargo').value,
        portfolio: document.getElementById('portfolio').value,
        motivo: document.getElementById('motivo').value
    };

    btn.disabled = true;
    status.style.display = "block";
    status.style.color = "#d8b4fe";
    status.textContent = "CONECTANDO AO SERVIDOR SEGURO DA NRG...";

    try {
        // Envia os dados para o seu servidor oculto
        const response = await fetch('/api/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dados)
        });

        const resultado = await response.json();

        if (response.ok) {
            status.style.color = "#00ff88";
            status.textContent = "ENVIADO COM SUCESSO! STATUS: " + resultado.statusIA;
            btn.textContent = "CANDIDATURA CONCLUÍDA";
        } else {
            throw new Error(resultado.error || "Erro desconhecido");
        }
    } catch (error) {
        status.style.color = "#ff3366";
        status.textContent = "ERRO: " + error.message;
        btn.disabled = false;
        btn.textContent = "TENTAR NOVAMENTE";
    }
});
</script>
</body>
</html>
